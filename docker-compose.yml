services:
  db:
    image: mysql:8.0
    container_name: fitness-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-fitness_flow}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fitness-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fitness-network

  backend:
    build: ./backend
    container_name: fitness-backend
    restart: on-failure
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root_password}
      - DB_NAME=${DB_NAME:-fitness_flow}
      - DB_PORT=3306
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-true}
      - PORT=${PORT:-4000}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src
      - ./backend/package*.json:/app/package*.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fitness-network

  frontend:
    build: ./frontend
    container_name: fitness-frontend
    restart: on-failure
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000/api
      - VITE_SOCKET_URL=http://localhost:4000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/package*.json:/app/package*.json
    depends_on:
      - backend
    networks:
      - fitness-network

volumes:
  db_data:

networks:
  fitness-network:
    driver: bridge