services:
  db:
    image: mysql:8.0
    container_name: fitness-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fitness-network

  backend:
    build: ./backend
    container_name: fitness-backend
    restart: on-failure
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=3306
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
    networks:
      - fitness-network

volumes:
  db_data:

networks:
  fitness-network:
    driver: bridge